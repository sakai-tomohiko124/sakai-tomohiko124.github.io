<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>便利リンク＆情報取得</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin:0; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px #ccc; }
        h2 { color: #1976d2; }
        .btns { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
        .btns a { flex: 1 1 40%; text-align:center; background: #00e0ff; color: #fff; text-decoration: none; padding: 12px 0; border-radius: 6px; font-weight: bold; transition: background 0.2s; box-shadow: 0 2px 6px #bbb; }
        .btns a:hover { background: #1976d2; }
        .info-block { background: #f0f8ff; border-left: 4px solid #00e0ff; margin: 18px 0; padding: 12px 16px; border-radius: 6px; }
        .nav { background:#222; color:#fff; padding:0.7em 0; text-align:center; font-size:1.1em; letter-spacing:1px; }
        .nav a { color:#00e0ff; margin:0 1em; text-decoration:underline; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">ホーム</a>
        <a href="index2.html">クイズ</a>
        <a href="index3.html">チャット</a>
        <a href="index4.html">便利リンク</a>
    </div>
    <div class="container">
        <h2>Webスクレイピングで情報取得</h2>
        <div class="info-block">
            <b>天気予報：</b>
            <span id="weather-result">取得中...</span><br>
            <a href="https://www.jma.go.jp/bosai/forecast/#area_type=offices&area_code=130000" target="_blank">気象庁 東京の天気</a>
        </div>
        <div class="info-block">
            <b>交通機関：</b>
            <span id="traininfo-result">取得中...</span><br>
            <a href="https://transit.yahoo.co.jp/diainfo/area/4" target="_blank">Yahoo! 交通情報（関東）</a>
        </div>
        <h2>便利リンク</h2>
        <div class="btns">
            <a href="https://www.youtube.com/" target="_blank">YouTube</a>
            <a href="https://www.google.com/" target="_blank">Google</a>
            <a href="https://mail.google.com/" target="_blank">Gmail</a>
            <a href="https://line.me/ja/" target="_blank">LINE</a>
            <a href="https://www.instagram.com/" target="_blank">インスタ</a>
            <a href="https://www.tiktok.com/ja-JP/" target="_blank">TikTok</a>
            <a href="https://www.alphapolis.co.jp/novel/31484585/380882757" target="_blank">小説</a>
        </div>
        </div>
            <script>
            function updateWeatherAndTrain() {
                // 気象庁の東京地方天気予報（JSON）
                fetch('https://www.jma.go.jp/bosai/forecast/data/overview_forecast/130000.json')
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('weather-result').textContent = data.text.split('\n')[0];
                    })
                    .catch(() => {
                        document.getElementById('weather-result').textContent = '取得できませんでした';
                    });

                // Yahoo!交通情報（関東）RSS（CORS制限がある場合は取得不可）
                fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://transit.yahoo.co.jp/traininfo/rss/4.xml'))
                    .then(r => r.json())
                    .then(data => {
                        const parser = new DOMParser();
                        const xml = parser.parseFromString(data.contents, 'text/xml');
                        const items = xml.querySelectorAll('item > title');
                        let result = '';
                        items.forEach((el, i) => {
                            if(i < 3) result += '・' + el.textContent + '<br>';
                        });
                        document.getElementById('traininfo-result').innerHTML = result || '運行情報はありません';
                    })
                    .catch(() => {
                        document.getElementById('traininfo-result').textContent = '取得できませんでした';
                    });
            }
            updateWeatherAndTrain();
            setInterval(updateWeatherAndTrain, 60000); // 1分ごとに更新
            </script>
</body>
</html>
