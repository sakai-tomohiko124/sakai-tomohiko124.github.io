    <style>
        /* アンケートページ固有のスタイル */
        body {
            font-size: 16px;
        }
        .survey-section {
            background-color: var(--bg-medium);
            border-radius: 15px;
            padding: 2em;
            margin-bottom: 2em;
            border-left: 4px solid var(--neon-blue);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .survey-section h2 {
            color: var(--neon-blue);
            font-family: 'Roboto Mono', monospace;
            font-size: 1.8em;
            margin-bottom: 1em;
            text-shadow: 0 0 8px rgba(0, 224, 255, 0.4);
        }
        .survey-form {
            display: flex;
            flex-direction: column;
            gap: 1.5em;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 0.5em;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 0.8em;
            border: 1px solid rgba(0, 224, 255, 0.3);
            border-radius: 8px;
            background-color: var(--bg-light);
            color: var(--text-primary);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1em;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            background-color: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            padding: 1em 2em;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
        }
        .submit-btn:hover {
            background-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(174, 0, 255, 0.5);
        }
        .thank-you {
            display: none;
            text-align: center;
            color: var(--neon-blue);
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <header class="futuristic-header">
        <div class="header-content">
            <h1><span class="neon-text">アンケート</span></h1>
            <p class="tagline">サイトの改善にご協力ください</p>
        </div>
    </header>

    <main class="main-content">
        <section class="survey-section">
            <h2>フィードバックをお聞かせください</h2>
            <form class="survey-form" id="surveyForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="form-group">
                    <label for="name">お名前（必須）</label>
                    <input type="text" id="name" name="name" required placeholder="お名前を入力してください">
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス（任意）</label>
                    <input type="email" id="email" name="email" placeholder="example@example.com">
                </div>
                    <select id="age" name="age" required>
                        <option value="">選択してください</option>
                        <option value="under20">20歳未満</option>
                        <option value="20-29">20-29歳</option>
                        <option value="30-39">30-39歳</option>
                        <option value="40-49">40-49歳</option>
                        <option value="50over">50歳以上</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="experience">プログラミング経験年数</label>
                    <select id="experience" name="experience" required>
                        <option value="">選択してください</option>
                        <option value="none">なし</option>
                        <option value="less1">1年未満</option>
                        <option value="1-3">1-3年</option>
                        <option value="3-5">3-5年</option>
                        <option value="5over">5年以上</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="usability">サイトの使いやすさ（1-5点）</label>
                    <select id="usability" name="usability" required>
                        <option value="">選択してください</option>
                        <option value="1">1 (使いにくい)</option>
                        <option value="2">2</option>
                        <option value="3">3 (普通)</option>
                        <option value="4">4</option>
                        <option value="5">5 (使いやすい)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="usefulness">用語集の役立ち度（1-5点）</label>
                    <select id="usefulness" name="usefulness" required>
                        <option value="">選択してください</option>
                        <option value="1">1 (役立たない)</option>
                        <option value="2">2</option>
                        <option value="3">3 (普通)</option>
                        <option value="4">4</option>
                        <option value="5">5 (役立つ)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="improvements">改善点やご意見</label>
                    <textarea id="improvements" name="improvements" placeholder="サイトの改善点や追加してほしい機能などをお聞かせください"></textarea>
                </div>

                <button type="submit" class="submit-btn">送信する</button>
            </form>

            <div class="thank-you" id="thankYou">
                <p>アンケートにご協力いただき、ありがとうございます！</p>
                <p>ご意見を参考にサイトを改善していきます。</p>
            </div>
        </section>
    </main>

    <footer class="futuristic-footer">
        <p>&copy; プログラム言語集</p>
        <p class="footer-note">初心者でもわかりやすく解説もあり！</p>
    </footer>

    <script>
        // Formspreeを使用するため、JavaScriptでの送信処理は不要
        // 必要に応じてバリデーションを追加可能
    </script>
</body>
</html>
